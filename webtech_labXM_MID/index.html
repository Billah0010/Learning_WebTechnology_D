<!DOCTYPE html>
<html>
<head>
    <title>Simple Tic Tac Toe</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .status { margin: 20px; font-size: 24px; font-weight: bold; }
        
        /* The Grid */
        .board { 
            display: grid; 
            grid-template-columns: repeat(3, 100px); 
            grid-template-rows: repeat(3, 100px); 
            gap: 5px; 
        }

        .square { 
            width: 100px; height: 100px; 
            background: #eee; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; cursor: pointer; 
        }

        button { margin-top: 20px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="status" id="message">Player X's Turn</div>

    <div class="board">
        <div class="square" id="0" onclick="play(0)"></div>
        <div class="square" id="1" onclick="play(1)"></div>
        <div class="square" id="2" onclick="play(2)"></div>
        <div class="square" id="3" onclick="play(3)"></div>
        <div class="square" id="4" onclick="play(4)"></div>
        <div class="square" id="5" onclick="play(5)"></div>
        <div class="square" id="6" onclick="play(6)"></div>
        <div class="square" id="7" onclick="play(7)"></div>
        <div class="square" id="8" onclick="play(8)"></div>
    </div>

    <button onclick="reset()">Restart Game</button>

    <script src="script.js"></script>
</body>
</html>
